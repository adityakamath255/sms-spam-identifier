<!DOCTYPE html>
<html>
<head>
    <title>SMS Spam Detection</title>
    <style>
        body {
            font-family: 'Lucida', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .background {
            background: linear-gradient(135deg, #cdffcd, #2575fc);
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .input-container {
            display: flex;
            margin-top: 20px;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        textarea {
            display: block;
            font-family: 'Lucida', monospace;
            width: 90%;
            height: 150px;
            padding: 10px 10px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: #bbb;
            outline: none;
        }

        button {
            background: #2575fc;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background: #7cacfd;
        }

        .output-container {
            margin-top: 20px;
            background: #f5f9ff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .prediction {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2575fc;
            margin-bottom: 10px;
        }

        .result {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .result-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .result-text {
            font-size: 1.2rem;
            color: #333;
        }
    </style>
</head>
<body class="background">
    <div class="container">
        <h1>Spam Detection System</h1>

        <div id="error-container" class="error-message" style="display: none;"></div>

        <form id="predictionForm">
            <div class="input-container">
                <textarea
                    id="messageInput"
                    name="message"
                    placeholder="Enter your message here..."
                    required></textarea>
            </div>
            <button type="submit">Check Message</button>
        </form>

        <div id="result-container" class="output-container" style="display: none;">
            <h2 id="prediction-text" class="prediction"></h2>
            <div class="result">
                <span id="result-icon" class="result-icon"></span>
                <span id="result-text" class="result-text"></span>
            </div>
        </div>

        <div id="loading-container" style="display: none; text-align: center; margin-top: 20px;">
            <p>Analyzing message...</p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const message = document.getElementById('messageInput').value.trim();
            if (!message) {
                showError('Please enter a message.');
                return;
            }

            document.getElementById('loading-container').style.display = 'block';
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('error-container').style.display = 'none';

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                document.getElementById('loading-container').style.display = 'none';

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to get prediction');
                }

                const result = await response.json();
                showResult(result);
            }
            catch (error) {
                document.getElementById('loading-container').style.display = 'none';
                showError(error.message || 'Error processing request');
            }
        });

        function showResult(result) {
            const resultContainer = document.getElementById('result-container');
            const predictionText = document.getElementById('prediction-text');
            const resultIcon = document.getElementById('result-icon');
            const resultText = document.getElementById('result-text');

            predictionText.textContent = result.prediction;

            if (result.prediction === 'SPAM') {
                resultContainer.classList.add('spam');
                resultContainer.classList.remove('not-spam');
                resultIcon.textContent = '\u26A0\uFE0F';
            }
            else {
                resultContainer.classList.add('not-spam');
                resultContainer.classList.remove('spam');
                resultIcon.textContent = '\u2705';
            }

              resultText.textContent = `This message is classified as ${result.prediction} with ${result.confidence} confidence.`;
            resultContainer.style.display = 'block';
        }

        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            errorContainer.textContent = message;
            errorContainer.style.display = 'block';
            document.getElementById('result-container').style.display = 'none';
        }
    </script>
</body>
</html>
